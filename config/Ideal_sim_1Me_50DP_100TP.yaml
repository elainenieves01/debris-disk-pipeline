simulation:
  name: "Ideal_sim_"
  random_seed: 0
  output_dir: "outputs"

units:
  time: "yr"
  length: "AU"
  mass: "Msun"

integration:
  integrator: "whfast"
  timestep_fraction_of_planet_period: 0.1
  maxtime: 1000000.0
  Noutputs: 20
  exit_max_distance: 1000.0

star:
  mass: 1.0

giant_planet:
  mass_jupiter: 1.26
  a: 2.56
  e: 0.07
  inc_deg: 0.01
  omega_deg: 100.0
  Omega_random: true

  t_peri_jd: 2450870.0
  orbital_period_days: 1311.0
  epoch_jd: 2451545.0

disk:
  amin: 30.0
  amax: 50.0
  emin: 0.0
  emax: 0.1
  imin_deg: 0.0
  imax_deg: 5.0

dwarf_planets:
  N: 50
  total_mass_earth: 1.0

test_particles:
  N: 100
  distribution: "uniform"

plots:
  dpi: 200

  scale:
    x: "linear"
    y: "linear"

  limits:
    #mode: "auto"
    mode: "manual"
    ae:
      xlim: null
      ylim: null

    ai:
      xlim: null
      ylim: null

    e_evolution:
      xlim: null
      ylim: null

    i_evolution:
      xlim: null
      ylim: null

    a_evolution:
      xlim: null
      ylim: null

    survival:
      xlim: null
      ylim: null

  final_conditions:
    output_file: "outputs/FinalConditions.png"
